<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bet Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --accent3: #4d9fff;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --green: #00e5a0;
    --red: #ff4757;
    --yellow: #ffd32a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* AUTH SCREEN */
  #auth-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; text-align: center;
  }
  #auth-screen h1 { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 4px; color: var(--accent); margin-bottom: 8px; }
  #auth-screen p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .auth-btn {
    background: var(--accent); color: #000; border: none; padding: 14px 32px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 16px;
    border-radius: 8px; cursor: pointer; width: 100%; max-width: 320px;
    transition: opacity 0.2s;
  }
  .auth-btn:hover { opacity: 0.85; }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); }
  .date-pill {
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 20px;
  }

  /* TABS */
  .tabs {
    display: flex; overflow-x: auto; padding: 12px 20px 0;
    gap: 8px; border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 8px 16px; border-radius: 8px 8px 0 0;
    font-size: 13px; font-weight: 500; cursor: pointer; border: none;
    background: transparent; color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface); }

  /* MAIN */
  main { padding: 16px 20px; }

  .loading {
    text-align: center; padding: 60px 20px; color: var(--muted);
    font-size: 14px;
  }
  .loading .spinner {
    width: 32px; height: 32px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 14px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  /* MATCH CARD */
  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .match-card:hover { border-color: var(--accent); }

  .match-header {
    padding: 14px 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
  }
  .match-info { flex: 1; }
  .match-teams {
    font-weight: 600; font-size: 15px; color: var(--text);
    margin-bottom: 4px;
  }
  .match-meta {
    display: flex; gap: 8px; align-items: center;
  }
  .meta-pill {
    font-family: 'DM Mono', monospace; font-size: 10px;
    padding: 2px 7px; border-radius: 4px; background: var(--surface2);
    color: var(--muted);
  }
  .meta-pill.time { color: var(--accent3); }
  .match-chevron {
    color: var(--muted); font-size: 18px; transition: transform 0.2s;
    margin-left: 12px;
  }
  .match-card.open .match-chevron { transform: rotate(180deg); }

  /* BET SECTIONS */
  .bet-sections { padding: 0 16px 16px; display: none; }
  .match-card.open .bet-sections { display: block; }

  .divider { height: 1px; background: var(--border); margin: 0 0 14px; }

  .bet-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .bet-block-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin-bottom: 10px;
  }

  /* ODDS CHECK */
  .odds-check-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .odds-label { font-size: 12px; color: var(--muted); flex: 1; }
  .odds-value {
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text); background: var(--bg);
    border: 1px solid var(--border); padding: 4px 10px;
    border-radius: 6px; width: 70px; text-align: center;
  }
  .odds-input {
    font-family: 'DM Mono', monospace; font-size: 13px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 5px 10px; border-radius: 6px;
    width: 70px; text-align: center; outline: none;
    transition: border-color 0.2s;
  }
  .odds-input:focus { border-color: var(--accent); }
  .viability-badge {
    font-size: 10px; font-weight: 600; padding: 3px 8px;
    border-radius: 4px; font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  .viability-badge.good { background: rgba(0,229,160,0.15); color: var(--green); }
  .viability-badge.bad { background: rgba(255,71,87,0.15); color: var(--red); }
  .viability-badge.unknown { background: var(--surface); color: var(--muted); }

  /* LOG BET FORM */
  .log-form { margin-top: 10px; }
  .log-row {
    display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
  }
  .log-label { font-size: 11px; color: var(--muted); width: 60px; flex-shrink: 0; }
  .log-input {
    flex: 1; font-family: 'DM Mono', monospace; font-size: 12px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 5px 10px; border-radius: 6px;
    outline: none; transition: border-color 0.2s;
  }
  .log-input:focus { border-color: var(--accent); }
  .outcome-select {
    flex: 1; font-family: 'DM Sans', sans-serif; font-size: 12px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 5px 10px; border-radius: 6px;
    outline: none;
  }
  .save-btn {
    width: 100%; padding: 9px; border: none; border-radius: 6px;
    background: var(--accent); color: #000; font-weight: 600;
    font-size: 13px; cursor: pointer; margin-top: 4px;
    font-family: 'DM Sans', sans-serif; transition: opacity 0.2s;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .saved-badge {
    text-align: center; font-size: 11px; color: var(--green);
    font-family: 'DM Mono', monospace; margin-top: 6px;
    display: none;
  }

  /* P&L DISPLAY */
  .pl-row {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); margin-top: 6px;
  }
  .pl-val { font-size: 12px; }
  .pl-val.pos { color: var(--green); }
  .pl-val.neg { color: var(--red); }

  /* DIPPING STRATEGY */
  .dip-minutes { display: flex; gap: 8px; margin-bottom: 10px; }
  .dip-minute-block {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px; text-align: center;
  }
  .dip-minute-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .dip-minute-input {
    width: 100%; font-family: 'DM Mono', monospace; font-size: 12px;
    background: transparent; border: none; color: var(--text);
    text-align: center; outline: none;
  }

  /* SUMMARY BAR */
  .summary-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    display: flex; gap: 16px; margin-bottom: 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .summary-bar::-webkit-scrollbar { display: none; }
  .summary-item { flex-shrink: 0; text-align: center; }
  .summary-item .label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .summary-item .value {
    font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500;
  }
  .summary-item .value.pos { color: var(--green); }
  .summary-item .value.neg { color: var(--red); }

  /* REFRESH BTN */
  .refresh-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 12px; border-radius: 6px;
    font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--accent);
    color: var(--accent); padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-family: 'DM Mono', monospace;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <h1>BET TRACKER</h1>
  <p>Sign in with Google to access your betting sheets</p>
  <button class="auth-btn" onclick="signIn()">Sign in with Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <h1>BET TRACKER</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="date-pill" id="today-date"></span>
      <button class="refresh-btn" onclick="loadAllSheets()">↻ Refresh</button>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="switchTab(0)" id="tab-0">SS Gambling</button>
    <button class="tab" onclick="switchTab(1)" id="tab-1">HW Gambling</button>
    <button class="tab" onclick="switchTab(2)" id="tab-2">3D Gambling</button>
  </div>

  <main id="main-content">
    <div class="loading"><div class="spinner"></div>Loading today's bets...</div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SPREADSHEET_ID = '1qE2V6BN_9925zMPjxc8aGQu15eBuS8lHR3QWP7UvMYw';
const CLIENT_ID      = '825652656668-4mu1r7k3ggraq0tenserhb5lm33mm707.apps.googleusercontent.com';
const SCOPES         = 'https://www.googleapis.com/auth/spreadsheets';

const SHEETS = [
  {
    name: 'SS Gambling',
    bets: [
      { key: 'btts7',   label: 'BTTS Yes (7am)',    colOdds: 7,  colStake: 8,  colOutcome: 9,  colPL: 10, colCumPL: 11, type: 'back', checkOdds: true },
      { key: 'btts5',   label: 'BTTS Yes (5 Min)',   colOdds: 7,  colStake: 8,  colOutcome: 9,  colPL: 10, colCumPL: 11, type: 'back', checkOdds: false },
      { key: 'o25',     label: 'Over 2.5 Goals',     colOdds: 12, colStake: 13, colOutcome: 14, colPL: 15, colCumPL: 16, type: 'back', checkOdds: false },
      { key: 'fhg',     label: 'FHG O0.5',           colOdds: 17, colStake: 18, colOutcome: 19, colPL: 20, colCumPL: 21, type: 'back', checkOdds: false },
      { key: 'o15',     label: 'Over 1.5',            colOdds: 22, colStake: 23, colOutcome: 24, colPL: 25, colCumPL: 26, type: 'back', checkOdds: false },
    ]
  },
  {
    name: 'HW Gambling',
    bets: [
      { key: 'hwback',  label: 'Home Back (5 Min)',  colOdds: 7,  colStake: 8,  colOutcome: 9,  colPL: 10, colCumPL: 11, type: 'back', checkOdds: false },
    ]
  },
  {
    name: '3D Gambling',
    bets: [
      { key: 'o25_7am', label: 'Over 2.5 (7am)',     colOdds: 7,  colStake: null, colOutcome: null, colPL: null, colCumPL: null, type: 'check', checkOdds: true },
      { key: 'o25_5m',  label: 'Over 2.5 (5 Min)',   colOdds: 8,  colStake: null, colOutcome: null, colPL: null, colCumPL: null, type: 'check', checkOdds: false },
      { key: 'dip',     label: 'Dipping Strategy',   col20: 9, col27: 10, col35: 11,
        colAveOdds: 12, colStake: 13, colOutcome: 14, colPL: 15,
        colLayOdds: 16, colLiability: 17, colLayBet: 18, colLayOutcome: 19, colLayPL: 20,
        type: 'dip' }
    ]
  }
];

// ── STATE ───────────────────────────────────────────────────────────────────
let tokenClient, accessToken;
let sheetsData = [[], [], []];
let currentTab = 0;
let rowMap = [{}, {}, {}]; // sheetIndex -> rowKey -> rowIndex (1-based in sheet)

// ── AUTH ─────────────────────────────────────────────────────────────────────
function loadGapi() {
  return new Promise(res => {
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = () => gapi.load('client', async () => {
      await gapi.client.init({ discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'] });
      res();
    });
    document.head.appendChild(s);
  });
}

function loadGis() {
  return new Promise(res => {
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = res;
    document.head.appendChild(s);
  });
}

async function init() {
  await Promise.all([loadGapi(), loadGis()]);
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showToast('Auth error: ' + resp.error, true); return; }
      accessToken = resp.access_token;
      gapi.client.setToken({ access_token: accessToken });
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      setTodayDate();
      await loadAllSheets();
    }
  });
}

function signIn() { tokenClient.requestAccessToken({ prompt: 'consent' }); }

// ── DATE ─────────────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}
function setTodayDate() {
  document.getElementById('today-date').textContent = todayStr();
}

// ── SHEETS API ───────────────────────────────────────────────────────────────
async function loadAllSheets() {
  document.getElementById('main-content').innerHTML = '<div class="loading"><div class="spinner"></div>Loading today\'s bets...</div>';
  try {
    const ranges = SHEETS.map(s => `'${s.name}'!A:V`);
    const resp = await gapi.client.sheets.spreadsheets.values.batchGet({
      spreadsheetId: SPREADSHEET_ID,
      ranges
    });
    const today = todayStr();
    sheetsData = resp.result.valueRanges.map((vr, si) => {
      const rows = vr.values || [];
      rowMap[si] = {};
      return rows.map((row, i) => {
        if (i === 0) return null; // header
        if ((row[1] || '').trim() === today) {
          rowMap[si][i] = i + 1; // 1-based sheet row
          return row;
        }
        return null;
      }).filter(Boolean);
    });
    renderTab(currentTab);
  } catch(e) {
    console.error(e);
    showToast('Failed to load data', true);
    document.getElementById('main-content').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>Could not load spreadsheet.<br>Check your connection and try refreshing.</div>';
  }
}

async function writeCell(sheetName, row, col, value) {
  // col is 0-based, row is 1-based
  const colLetter = colToLetter(col);
  const range = `'${sheetName}'!${colLetter}${row}`;
  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId: SPREADSHEET_ID,
    range,
    valueInputOption: 'USER_ENTERED',
    resource: { values: [[value]] }
  });
}

async function writeRow(sheetName, row, startCol, values) {
  const colLetter = colToLetter(startCol);
  const range = `'${sheetName}'!${colLetter}${row}`;
  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId: SPREADSHEET_ID,
    range,
    valueInputOption: 'USER_ENTERED',
    resource: { values: [values] }
  });
}

function colToLetter(col) {
  let s = '';
  col = col + 1; // 1-based
  while (col > 0) {
    let r = (col - 1) % 26;
    s = String.fromCharCode(65 + r) + s;
    col = Math.floor((col - 1) / 26);
  }
  return s;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function switchTab(i) {
  currentTab = i;
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  renderTab(i);
}

function renderTab(si) {
  const rows = sheetsData[si];
  const sheet = SHEETS[si];
  const main = document.getElementById('main-content');

  if (!rows || rows.length === 0) {
    main.innerHTML = '<div class="empty-state"><div class="icon">📋</div>No bets found for today.<br><span style="font-size:12px;color:var(--muted)">Bets will appear here once added to the sheet.</span></div>';
    return;
  }

  // Summary
  let totalPL = 0;
  rows.forEach(row => {
    sheet.bets.forEach(bet => {
      if (bet.colPL != null && row[bet.colPL]) {
        const v = parseFloat(row[bet.colPL]);
        if (!isNaN(v)) totalPL += v;
      }
    });
  });

  const html = [];
  html.push(`<div class="summary-bar">
    <div class="summary-item"><div class="label">TODAY'S BETS</div><div class="value">${rows.length}</div></div>
    <div class="summary-item"><div class="label">P&amp;L</div><div class="value ${totalPL>=0?'pos':'neg'}">${totalPL>=0?'+':''}${totalPL.toFixed(2)}</div></div>
  </div>`);

  rows.forEach((row, ri) => {
    const homeTeam = row[5] || '?';
    const awayTeam = row[6] || '?';
    const time = row[2] || '';
    const comp = row[4] || '';
    const cardId = `card-${si}-${ri}`;
    html.push(`<div class="match-card" id="${cardId}">
      <div class="match-header" onclick="toggleCard('${cardId}')">
        <div class="match-info">
          <div class="match-teams">${homeTeam} vs ${awayTeam}</div>
          <div class="match-meta">
            <span class="meta-pill time">${time}</span>
            <span class="meta-pill">${comp}</span>
          </div>
        </div>
        <span class="match-chevron">⌄</span>
      </div>
      <div class="bet-sections">
        <div class="divider"></div>
        ${renderBets(si, ri, row, sheet)}
      </div>
    </div>`);
  });

  main.innerHTML = html.join('');
}

function renderBets(si, ri, row, sheet) {
  return sheet.bets.map(bet => {
    if (bet.type === 'dip') return renderDipBet(si, ri, row, bet);
    if (bet.type === 'check') return renderCheckBet(si, ri, row, bet);
    return renderBackBet(si, ri, row, bet, sheet.name);
  }).join('');
}

function renderCheckBet(si, ri, row, bet) {
  const targetOdds = row[bet.colOdds] || '—';
  return `<div class="bet-block">
    <div class="bet-block-title">${bet.label}</div>
    <div class="odds-check-row">
      <span class="odds-label">Target Odds</span>
      <span class="odds-value">${targetOdds}</span>
    </div>
  </div>`;
}

function renderBackBet(si, ri, row, bet, sheetName) {
  const id = `${si}-${ri}-${bet.key}`;
  const targetOdds = row[bet.colOdds] || '';
  const savedStake = row[bet.colStake] || '';
  const savedOutcome = row[bet.colOutcome] || '';
  const savedPL = row[bet.colPL] || '';
  const savedCumPL = row[bet.colCumPL] || '';
  const plNum = parseFloat(savedPL);
  const cumNum = parseFloat(savedCumPL);

  return `<div class="bet-block">
    <div class="bet-block-title">${bet.label}</div>
    <div class="odds-check-row">
      <span class="odds-label">Min. Odds Needed</span>
      <span class="odds-value">${targetOdds || '—'}</span>
      <span class="viability-badge unknown" id="vbadge-${id}">Enter odds</span>
    </div>
    <div class="odds-check-row">
      <span class="odds-label">Bookie Odds Now</span>
      <input class="odds-input" id="currodds-${id}" type="number" step="0.01" placeholder="e.g. 1.95"
        oninput="checkViability('${id}', ${parseFloat(targetOdds)||0})">
    </div>
    <div class="divider" style="margin:10px 0"></div>
    <div class="log-form">
      <div class="log-row">
        <span class="log-label">Odds got</span>
        <input class="log-input" id="logodds-${id}" type="number" step="0.01" placeholder="Actual odds" value="${savedStake?targetOdds:''}">
      </div>
      <div class="log-row">
        <span class="log-label">Stake</span>
        <input class="log-input" id="logstake-${id}" type="number" step="0.01" placeholder="£" value="${savedStake}">
      </div>
      <div class="log-row">
        <span class="log-label">Outcome</span>
        <select class="outcome-select" id="logoutcome-${id}">
          <option value="">-- Select --</option>
          <option value="W" ${savedOutcome==='W'?'selected':''}>✅ Win</option>
          <option value="L" ${savedOutcome==='L'?'selected':''}>❌ Loss</option>
          <option value="V" ${savedOutcome==='V'?'selected':''}>↩ Void</option>
        </select>
      </div>
      <button class="save-btn" onclick="saveBet('${id}', '${sheetName}', ${si}, ${ri}, ${JSON.stringify(bet).replace(/"/g,"'")})">Save to Sheet</button>
      <div class="saved-badge" id="saved-${id}">✓ Saved</div>
      ${savedPL ? `<div class="pl-row"><span>P/L</span><span class="pl-val ${plNum>=0?'pos':'neg'}">${plNum>=0?'+':''}${plNum.toFixed(2)}</span></div>` : ''}
      ${savedCumPL ? `<div class="pl-row"><span>Cumulative</span><span class="pl-val ${cumNum>=0?'pos':'neg'}">${cumNum>=0?'+':''}${cumNum.toFixed(2)}</span></div>` : ''}
    </div>
  </div>`;
}

function renderDipBet(si, ri, row, bet) {
  const id = `${si}-${ri}-dip`;
  const sheetName = SHEETS[si].name;
  const min20 = row[bet.col20] || '';
  const min27 = row[bet.col27] || '';
  const min35 = row[bet.col35] || '';
  const aveOdds = row[bet.colAveOdds] || '';
  const stake = row[bet.colStake] || '';
  const outcome = row[bet.colOutcome] || '';
  const pl = row[bet.colPL] || '';
  const layOdds = row[bet.colLayOdds] || '';
  const liability = row[bet.colLiability] || '';
  const layBet = row[bet.colLayBet] || '';
  const layOutcome = row[bet.colLayOutcome] || '';
  const layPL = row[bet.colLayPL] || '';
  const plNum = parseFloat(pl);
  const layPLNum = parseFloat(layPL);

  return `<div class="bet-block">
    <div class="bet-block-title">Dipping Strategy — Back @ Minutes</div>
    <div class="dip-minutes">
      ${[{label:'20\'',val:min20,col:bet.col20},{label:'27\'',val:min27,col:bet.col27},{label:'35\'',val:min35,col:bet.col35}].map(m => `
        <div class="dip-minute-block">
          <div class="dip-minute-label">${m.label}</div>
          <input class="dip-minute-input" type="number" step="0.01" placeholder="odds" value="${m.val}" id="dip-${id}-${m.col}">
        </div>
      `).join('')}
    </div>
    <div class="log-row">
      <span class="log-label">Ave Odds</span>
      <input class="log-input" id="dipave-${id}" type="number" step="0.01" placeholder="Average" value="${aveOdds}">
    </div>
    <div class="log-row">
      <span class="log-label">Stake ea.</span>
      <input class="log-input" id="dipstake-${id}" type="number" step="0.01" placeholder="£" value="${stake}">
    </div>
    <div class="log-row">
      <span class="log-label">Outcome</span>
      <select class="outcome-select" id="dipoutcome-${id}">
        <option value="">-- Select --</option>
        <option value="W" ${outcome==='W'?'selected':''}>✅ Win</option>
        <option value="L" ${outcome==='L'?'selected':''}>❌ Loss</option>
        <option value="V" ${outcome==='V'?'selected':''}>↩ Void</option>
      </select>
    </div>
    ${pl ? `<div class="pl-row"><span>Back P/L</span><span class="pl-val ${plNum>=0?'pos':'neg'}">${plNum>=0?'+':''}${plNum.toFixed(2)}</span></div>` : ''}

    <div class="divider" style="margin:12px 0"></div>
    <div class="bet-block-title">Lay Bet (on goal)</div>
    <div class="log-row">
      <span class="log-label">Lay Odds</span>
      <input class="log-input" id="layodds-${id}" type="number" step="0.01" placeholder="Lay odds" value="${layOdds}">
    </div>
    <div class="log-row">
      <span class="log-label">Liability</span>
      <input class="log-input" id="layliab-${id}" type="number" step="0.01" placeholder="£" value="${liability}">
    </div>
    <div class="log-row">
      <span class="log-label">Lay Bet</span>
      <input class="log-input" id="laybet-${id}" type="number" step="0.01" placeholder="£" value="${layBet}">
    </div>
    <div class="log-row">
      <span class="log-label">Outcome</span>
      <select class="outcome-select" id="layoutcome-${id}">
        <option value="">-- Select --</option>
        <option value="W" ${layOutcome==='W'?'selected':''}>✅ Win</option>
        <option value="L" ${layOutcome==='L'?'selected':''}>❌ Loss</option>
        <option value="V" ${layOutcome==='V'?'selected':''}>↩ Void</option>
      </select>
    </div>
    ${layPL ? `<div class="pl-row"><span>Lay P/L</span><span class="pl-val ${layPLNum>=0?'pos':'neg'}">${layPLNum>=0?'+':''}${layPLNum.toFixed(2)}</span></div>` : ''}

    <button class="save-btn" onclick="saveDipBet('${id}', '${sheetName}', ${si}, ${ri}, ${JSON.stringify(bet).replace(/"/g,"'")})">Save to Sheet</button>
    <div class="saved-badge" id="saved-${id}">✓ Saved</div>
  </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function toggleCard(cardId) {
  document.getElementById(cardId).classList.toggle('open');
}

function checkViability(id, targetOdds) {
  const input = document.getElementById('currodds-' + id);
  const badge = document.getElementById('vbadge-' + id);
  const curr = parseFloat(input.value);
  if (!curr || !targetOdds) { badge.className = 'viability-badge unknown'; badge.textContent = 'Enter odds'; return; }
  if (curr >= targetOdds) { badge.className = 'viability-badge good'; badge.textContent = '✓ VIABLE'; }
  else { badge.className = 'viability-badge bad'; badge.textContent = '✗ TOO LOW'; }
}

function getSheetRow(si, ri) {
  // Find the actual row number in the sheet for this data row
  // sheetsData[si][ri] is the ri-th today-match
  // We need to find its original 1-based row in the full sheet
  const keys = Object.keys(rowMap[si]);
  if (keys[ri] !== undefined) return parseInt(keys[ri]) + 1; // +1 because we skipped header
  return null;
}

async function saveBet(id, sheetName, si, ri, bet) {
  const logOdds   = document.getElementById('logodds-' + id)?.value || '';
  const stake     = document.getElementById('logstake-' + id)?.value || '';
  const outcome   = document.getElementById('logoutcome-' + id)?.value || '';
  const btn       = document.querySelector(`button[onclick*="'${id}'"]`);

  if (!stake && !outcome) { showToast('Enter at least a stake or outcome', true); return; }

  btn.disabled = true; btn.textContent = 'Saving...';

  try {
    const sheetRow = getSheetRow(si, ri);
    if (!sheetRow) throw new Error('Row not found');

    // Calculate P/L
    let pl = '';
    if (stake && outcome) {
      const s = parseFloat(stake), o = parseFloat(logOdds || bet.colOdds);
      if (outcome === 'W') pl = ((o - 1) * s).toFixed(2);
      else if (outcome === 'L') pl = (-s).toFixed(2);
      else pl = '0';
    }

    // Write stake, outcome, P/L
    if (bet.colStake != null) await writeCell(sheetName, sheetRow, bet.colStake, stake);
    if (bet.colOutcome != null) await writeCell(sheetName, sheetRow, bet.colOutcome, outcome);
    if (bet.colPL != null && pl !== '') await writeCell(sheetName, sheetRow, bet.colPL, pl);

    showToast('Saved ✓');
    document.getElementById('saved-' + id).style.display = 'block';
    btn.textContent = 'Save to Sheet'; btn.disabled = false;
    await loadAllSheets();
  } catch(e) {
    console.error(e);
    showToast('Save failed', true);
    btn.textContent = 'Save to Sheet'; btn.disabled = false;
  }
}

async function saveDipBet(id, sheetName, si, ri, bet) {
  const btn = document.querySelector(`button[onclick*="saveDipBet('${id}'"]`);
  btn.disabled = true; btn.textContent = 'Saving...';

  try {
    const sheetRow = getSheetRow(si, ri);
    if (!sheetRow) throw new Error('Row not found');

    const min20 = document.getElementById(`dip-${id}-${bet.col20}`)?.value || '';
    const min27 = document.getElementById(`dip-${id}-${bet.col27}`)?.value || '';
    const min35 = document.getElementById(`dip-${id}-${bet.col35}`)?.value || '';
    const aveOdds = document.getElementById(`dipave-${id}`)?.value || '';
    const stake = document.getElementById(`dipstake-${id}`)?.value || '';
    const outcome = document.getElementById(`dipoutcome-${id}`)?.value || '';
    const layOdds = document.getElementById(`layodds-${id}`)?.value || '';
    const liability = document.getElementById(`layliab-${id}`)?.value || '';
    const layBet = document.getElementById(`laybet-${id}`)?.value || '';
    const layOutcome = document.getElementById(`layoutcome-${id}`)?.value || '';

    // Back P/L
    let pl = '';
    if (stake && outcome) {
      const s = parseFloat(stake) * 3; // 3 dips
      const o = parseFloat(aveOdds) || 1.5;
      if (outcome === 'W') pl = ((o - 1) * s).toFixed(2);
      else if (outcome === 'L') pl = (-s).toFixed(2);
      else pl = '0';
    }

    // Lay P/L
    let layPL = '';
    if (layBet && layOutcome) {
      const lb = parseFloat(layBet), lo = parseFloat(layOdds) || 1;
      if (layOutcome === 'W') layPL = lb.toFixed(2);
      else if (layOutcome === 'L') layPL = (-(lo - 1) * lb).toFixed(2);
      else layPL = '0';
    }

    await writeRow(sheetName, sheetRow, bet.col20,
      [min20, min27, min35, aveOdds, stake, outcome, pl, layOdds, liability, layBet, layOutcome, layPL]);

    showToast('Saved ✓');
    document.getElementById('saved-' + id).style.display = 'block';
    btn.textContent = 'Save to Sheet'; btn.disabled = false;
    await loadAllSheets();
  } catch(e) {
    console.error(e);
    showToast('Save failed', true);
    btn.textContent = 'Save to Sheet'; btn.disabled = false;
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
init();
</script>
